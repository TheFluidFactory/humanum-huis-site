<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Humanum Huis</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f0d0b; --warm:#f4f0e8; --cream:#ece6d8;
    --sage:#4a6359; --sage-lt:#5e7a6e; --muted:#a09282;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--ink);
    color:var(--warm);
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
    min-height:100vh;
  }
  .wrap{max-width:560px;}
  .mark{
    font-family:'Cormorant SC',serif;
    font-weight:300;
    font-size:13px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--sage-lt);
    margin-bottom:48px;
  }
  .code{
    font-family:'Raleway',sans-serif;
    font-weight:200;
    font-size:11px;
    letter-spacing:0.5em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:24px;
  }
  h1{
    font-weight:300;
    font-size:clamp(34px,6vw,52px);
    line-height:1.12;
    margin-bottom:28px;
  }
  h1 em{font-style:italic;color:var(--sage-lt);}
  p{
    font-size:19px;
    line-height:1.75;
    color:rgba(244,240,232,0.78);
    margin-bottom:44px;
  }
  a.home{
    display:inline-block;
    font-family:'Raleway',sans-serif;
    font-weight:400;
    font-size:10px;
    letter-spacing:0.4em;
    text-transform:uppercase;
    color:var(--warm);
    text-decoration:none;
    border:1px solid rgba(244,240,232,0.3);
    padding:16px 36px;
    transition:border-color .2s, color .2s;
  }
  a.home:hover{border-color:var(--sage-lt);color:var(--sage-lt);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">Humanum Huis</div>
    <div class="code">Error 404</div>
    <h1>This page <em>isn't here.</em></h1>
    <p>The page you were looking for has moved, or never existed. The work itself is still right where you left it.</p>
    <a class="home" href="/">Return home</a>
  </div>
</body>
</html>
