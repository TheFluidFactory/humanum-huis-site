<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Found — Humanum Huis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0d0b;
    --warm: #f4f0e8;
    --sage: #4a6359;
    --sage-pale: #8fa095;
    --sage-deep: #374f44;
    --muted: rgba(244,240,232,0.5);
  }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--ink);
    color: var(--warm);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 60% at 70% 40%, rgba(74,99,89,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 20% 70%, rgba(74,99,89,0.08) 0%, transparent 55%);
    pointer-events: none;
  }
  .wrap { max-width: 36rem; position: relative; z-index: 1; }
  .label {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--sage-pale);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .label::before, .label::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--sage);
  }
  h1 {
    font-style: italic;
    font-weight: 300;
    font-size: clamp(36px, 5vw, 54px);
    line-height: 1.2;
    margin-bottom: 2rem;
    letter-spacing: -0.005em;
  }
  h1 em { color: var(--sage); font-style: italic; }
  p {
    font-weight: 300;
    font-size: 19px;
    color: var(--muted);
    margin-bottom: 3rem;
    line-height: 1.7;
  }
  a.home {
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--warm);
    background: var(--sage);
    padding: 16px 32px;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
  }
  a.home:hover { background: var(--sage-deep); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">404</div>
    <h1>This room hasn't been<br><em>built yet.</em></h1>
    <p>The page you're looking for isn't here — or not yet. The house is still under construction.</p>
    <a href="/" class="home">Return to the entrance</a>
  </div>
</body>
</html>
