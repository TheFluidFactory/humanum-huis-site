<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — Humanum Huis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #0F0E0C;
      color: #C8BCA0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .wrap { max-width: 32rem; }
    .label {
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8FA095;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-style: italic;
      font-weight: 400;
      font-size: 2.2rem;
      color: #E6DEC8;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }
    p { margin-bottom: 2rem; }
    a {
      color: #8FA095;
      text-decoration: none;
      border-bottom: 1px solid #4A5C50;
      padding-bottom: 2px;
      transition: color 0.2s ease;
    }
    a:hover { color: #E6DEC8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label">404</div>
    <h1>This room hasn't been built yet.</h1>
    <p>The page you're looking for isn't here — or not yet.</p>
    <a href="/">Return to the entrance</a>
  </div>
</body>
</html>
